<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>遊戲方程式 Game Equation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- React & ReactDOM (UMD only - removed conflicting importmap) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'wuxia-bg': '#180a0a',
              'wuxia-card': '#2b1212',
              'wuxia-red': '#dc2626',
              'wuxia-red-dark': '#991b1b',
              'wuxia-gold': '#fbbf24',
              'wuxia-gold-dark': '#b45309',
              'wuxia-text': '#fce7f3',
              'wuxia-jade': '#10b981',
            },
            backgroundImage: {
              'pattern-cloud': "url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjUxLCAxOTEsIDM2LCAwLjEpIi8+PC9zdmc+')",
            },
            animation: {
              'marquee': 'marquee 25s linear infinite',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(100%)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #180a0a;
        background-image: radial-gradient(circle at 50% 0%, #451a1a 0%, #180a0a 70%);
        color: #fce7f3;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #2b1212; }
      ::-webkit-scrollbar-thumb { background: #78350f; border-radius: 4px; border: 1px solid #451a1a; }
      ::-webkit-scrollbar-thumb:hover { background: #92400e; }
      .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .text-glow { text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
      .z-modal { z-index: 60; }
      .swal2-popup { background: #2b1212 !important; border: 1px solid #fbbf24; color: #fce7f3 !important; }
      .swal2-title { color: #fbbf24 !important; }
      .swal2-confirm { background: linear-gradient(to right, #dc2626, #991b1b) !important; }
      /* Grid columns slider */
      .grid-cols-custom { display: grid; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      // ==========================================
      // 設定與全域變數
      // ==========================================
      const LIFF_ID = '2008912922-0bJiM0sT'; 
      const LIFF_URL = `https://liff.line.me/${LIFF_ID}`;
      const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxo-_jcz9ApUTS6ENUAKYmg5ggT3h8AGAoulKlMZu4uSh-hx5yCC2qOr6XLLhedjKBsew/exec';
      // FIX #9: ADMIN_ID 只用於前端顯示判斷，後端仍有驗證；可考慮改由後端回傳 isAdmin
      const ADMIN_ID = 'Ua66fd77f72e4524075afd856cae91587';
      const LOGO_URL = 'https://placehold.co/200x200/991b1b/fbbf24?text=Game'; 
      const BANK_INFO = {
        code: '823',
        name: '將來銀行',
        account: '88618888888836'
      };
      
      const isGAS = typeof google !== 'undefined' && google.script;

      // ==========================================
      // 服務層 (Backend API)
      // ==========================================
      const withTimeout = (promise, ms = 30000) => {
          return Promise.race([
              promise,
              new Promise((_, reject) => setTimeout(() => reject(new Error("請求逾時，請檢查網路或稍後再試")), ms))
          ]);
      };

      const getProducts = () => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).getProducts();
        } else {
          fetch(`${GAS_API_URL}?action=getProducts`).then(r=>r.json()).then(d=>{ if(d.error) reject(new Error(d.error)); else resolve(d); }).catch(reject);
        }
      });

      const getMyOrders = (userId) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).getUserOrders(userId);
        } else {
          fetch(`${GAS_API_URL}?action=getUserOrders&userId=${userId}`).then(r=>r.json()).then(d=>{ if(d.error) reject(new Error(d.error)); else resolve(d); }).catch(reject);
        }
      });

      const getMemberProfileBackend = (userId) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).getMemberProfile(userId);
        } else {
          fetch(`${GAS_API_URL}?action=getMemberProfile&userId=${userId}`).then(r=>r.json()).then(resolve).catch(reject);
        }
      });

      const updateMemberProfileBackend = (data) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).updateMemberProfile(data);
        } else {
          fetch(GAS_API_URL, { method:'POST', redirect:'follow', headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({action:'updateMemberProfile',...data}) })
            .then(r=>r.json()).then(d=>{ if(d.success) resolve(d); else reject(new Error(d.message)); }).catch(reject);
        }
      });

      const logUserToBackend = (user) => {
        if (isGAS) {
          google.script.run.logUserAccess(user);
        } else {
          fetch(GAS_API_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({action:'logUserAccess', data: user}) }).catch(console.error);
        }
      };

      const processCartOrderBackend = (user, paymentNote, cartItems) => {
        const items = cartItems.map(i => ({ productId: i.product.id, quantity: i.quantity, name: i.product.name, price: i.product.price }));
        return new Promise((resolve, reject) => {
          if (isGAS) {
            google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).processCartOrder(user, paymentNote, items);
          } else {
            fetch(GAS_API_URL, { method:'POST', redirect:'follow', headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({action:'processCartOrder', user, paymentNote, cartItems: items}) })
              .then(async r => { const t = await r.text(); try { return JSON.parse(t); } catch(e) { throw new Error("伺服器回應異常"); } })
              .then(d => { if(d.success) resolve(d); else reject(new Error(d.message || 'Order failed')); }).catch(reject);
          }
        });
      };

      const updateOrderPaymentBackend = (userId, orderId, paymentNote) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).updateOrderPayment(userId, orderId, paymentNote);
        } else {
          fetch(GAS_API_URL, { method:'POST', redirect:'follow', headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({action:'updateOrderPayment', userId, orderId, paymentNote}) })
            .then(async r => { const t = await r.text(); try { return JSON.parse(t); } catch(e) { throw new Error("伺服器回應異常"); } })
            .then(d => { if(d.success) resolve(d); else reject(new Error(d.message)); }).catch(reject);
        }
      });

      const cancelOrderBackend = (userId, orderId) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).cancelOrder(userId, orderId);
        } else {
          fetch(GAS_API_URL, { method:'POST', redirect:'follow', headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({action:'cancelOrder', userId, orderId}) })
            .then(r=>r.json()).then(d => { if(d.success) resolve(d); else reject(new Error(d.message)); }).catch(reject);
        }
      });

      // FIX #2 & #10: archiveOrder 統一服務函數，加入 userId 驗證
      const archiveOrderBackend = (userId, orderId) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).archiveOrder(orderId, userId);
        } else {
          fetch(GAS_API_URL, { method:'POST', redirect:'follow', headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({action:'archiveOrder', userId, orderId}) })
            .then(r=>r.json()).then(d => { if(d.success) resolve(d); else reject(new Error(d.message)); }).catch(reject);
        }
      });

      const submitIssueReport = (data) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).submitIssue(data);
        } else {
          fetch(GAS_API_URL, { method:'POST', redirect:'follow', headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({action:'submitIssue', data}) })
            .then(r=>r.json()).then(d => { if(d.success) resolve(d); else reject(new Error(d.message)); }).catch(reject);
        }
      });

      // NEW #4: 取得用戶回報紀錄
      const getMyIssues = (userId) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).getMyIssues(userId);
        } else {
          fetch(`${GAS_API_URL}?action=getMyIssues&userId=${userId}`).then(r=>r.json()).then(d=>{ if(d.error) reject(new Error(d.error)); else resolve(d); }).catch(reject);
        }
      });

      // === Admin API ===
      const callAdminApi = (subAction, payload) => new Promise((resolve, reject) => {
        if (isGAS) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message || e))).handleAdminAction({ adminId: ADMIN_ID, subAction, payload });
        } else {
          fetch(GAS_API_URL, { method:'POST', redirect:'follow', headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify({action:'adminAction', adminId: ADMIN_ID, subAction, payload}) })
            .then(r=>r.json()).then(d => { if(d.success) resolve(d); else reject(new Error(d.message || 'Admin Action Failed')); }).catch(reject);
        }
      });

      // ==========================================
      // Components
      // ==========================================
      const AnnouncementBar = () => (
        <div className="fixed top-20 left-0 right-0 h-6 bg-black/80 border-b border-wuxia-gold/20 z-40 flex items-center overflow-hidden">
          <div className="whitespace-nowrap animate-marquee text-[10px] sm:text-xs text-wuxia-gold font-mono tracking-widest">
            🔔 系統公告：全自動發卡系統正常運作中 ⚡️ 訂單保留時間為30分鐘，請儘速付款以確保自動發貨 ⚡️ 若有疑問請點擊「回報」聯繫客服 🔔
          </div>
        </div>
      );

      const CountdownTimer = ({ targetDate, onExpire }) => {
        const [timeLeft, setTimeLeft] = React.useState('');
        const [isUrgent, setIsUrgent] = React.useState(false);
        React.useEffect(() => {
          const interval = setInterval(() => {
            const distance = targetDate - Date.now();
            if (distance < 0) { clearInterval(interval); setTimeLeft('EXPIRED'); if(onExpire) onExpire(); return; }
            const m = Math.floor((distance % (1000*60*60)) / (1000*60));
            const s = Math.floor((distance % (1000*60)) / 1000);
            setTimeLeft(`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
            if (distance < 5*60*1000) setIsUrgent(true);
          }, 1000);
          return () => clearInterval(interval);
        }, [targetDate]);
        if (timeLeft === 'EXPIRED') return <span className="text-stone-500 text-xs font-bold bg-stone-800 px-2 py-1 rounded">⚠️ 訂單已過期</span>;
        return (
          <div className={`flex items-center gap-1 ${isUrgent ? 'animate-pulse' : ''}`}>
            <span className="text-[10px] text-stone-400">剩餘時間</span>
            <span className={`font-mono font-bold text-sm ${isUrgent ? 'text-red-500' : 'text-wuxia-gold'}`}>{timeLeft}</span>
          </div>
        );
      };

      const Navbar = ({ user, cartCount, unreadCount, onReport, onSuggest, onWallet, onProfile, onOpenCart, onLogin }) => {
        const isGuest = !user || user.userId === 'test-user';
        return (
          <nav className="fixed top-0 left-0 right-0 z-50 bg-[#180a0a]/95 backdrop-blur-sm border-b-2 border-wuxia-gold-dark shadow-lg shadow-black/50 h-20">
            <div className="container mx-auto px-4 h-full flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="relative group cursor-pointer">
                  <div className="absolute -inset-1 bg-gradient-to-r from-wuxia-red to-wuxia-gold rounded-full opacity-60 group-hover:opacity-90 blur transition duration-500 animate-pulse"></div>
                  <img src={LOGO_URL} alt="Logo" className="h-14 w-14 rounded-full relative bg-wuxia-bg object-cover border-2 border-wuxia-gold p-0.5" />
                </div>
                <div className="flex flex-col">
                  <div className="flex items-center gap-2">
                    <span className="font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-wuxia-gold via-yellow-200 to-wuxia-gold tracking-wider">遊戲方程式</span>
                    <span className="text-[10px] bg-wuxia-gold/20 text-wuxia-gold border border-wuxia-gold/50 px-1 rounded font-mono">Ver 3.0</span>
                  </div>
                  <span className="text-[10px] text-red-400 font-mono uppercase tracking-[0.2em]">Game Equation</span>
                </div>
              </div>
              <div className="flex items-center gap-2 sm:gap-4">
                <button onClick={onOpenCart} className="relative p-2 text-wuxia-gold hover:text-white transition">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                  {cartCount > 0 && <span className="absolute -top-1 -right-1 bg-wuxia-red text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border border-wuxia-bg animate-bounce font-bold">{cartCount}</span>}
                </button>
                {!isGuest && (
                  <button onClick={onWallet} className="relative p-2 text-wuxia-gold hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    {unreadCount > 0 && <span className="absolute -top-1 -right-1 bg-green-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border border-wuxia-bg animate-pulse font-bold">{unreadCount}</span>}
                  </button>
                )}
                <div className="hidden sm:flex items-center gap-2">
                  <button onClick={onReport} className="px-3 py-1 text-xs border border-wuxia-red/50 text-wuxia-red hover:bg-wuxia-red hover:text-white transition rounded">回報</button>
                  <button onClick={onSuggest} className="px-3 py-1 text-xs border border-blue-500/50 text-blue-400 hover:bg-blue-600 hover:text-white transition rounded">功能建議</button>
                </div>
                {!isGuest ? (
                  <button onClick={onProfile} className="flex items-center gap-3 pl-2 sm:pl-4 sm:border-l sm:border-wuxia-card hover:brightness-110 transition">
                    <img src={user.pictureUrl || 'https://picsum.photos/100/100'} alt={user.displayName} className="w-10 h-10 rounded-full border-2 border-wuxia-gold/70 shadow-md" />
                  </button>
                ) : (
                  <button onClick={onLogin} className="flex items-center gap-2 px-3 py-1.5 bg-[#06C755] hover:bg-[#05b34c] text-white rounded font-bold text-xs transition shadow-[0_0_10px_rgba(6,199,85,0.4)]">
                    <span>LINE 登入</span>
                  </button>
                )}
              </div>
            </div>
          </nav>
        );
      };

      // FIX #3: ProductCard 接受 colCount prop 調整大小
      const ProductCard = ({ product, onAdd, colCount }) => {
        const category = (product.category || '').trim();
        const isMobile = category === '手機遊戲';
        const isWeb = category === '網頁遊戲';
        let tagClass = 'bg-blue-900/80 border-blue-500 text-blue-100';
        if (isMobile) tagClass = 'bg-purple-900/80 border-purple-500 text-purple-100';
        if (isWeb) tagClass = 'bg-green-900/80 border-green-500 text-green-100';
        const isCompact = colCount >= 3;
        return (
          <div className="group relative bg-wuxia-card rounded-lg overflow-hidden border border-wuxia-gold-dark/50 shadow-xl hover:shadow-wuxia-red/20 transition-all duration-300 hover:-translate-y-1 flex flex-col h-full bg-pattern-cloud">
            <div className="aspect-video w-full overflow-hidden bg-black relative border-b border-wuxia-gold-dark/30">
              <img src={product.imageUrl} alt={product.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-80 group-hover:opacity-100" />
              <div className={`absolute top-2 right-2 backdrop-blur-md px-2 py-0.5 rounded text-[10px] font-bold border shadow-lg tracking-widest ${tagClass}`}>{product.category}</div>
            </div>
            <div className={`flex flex-col flex-grow relative ${isCompact ? 'p-3' : 'p-5'}`}>
              <h3 className={`font-bold text-wuxia-gold mb-1 leading-tight group-hover:text-white transition-colors ${isCompact ? 'text-sm' : 'text-lg'}`}>{product.name}</h3>
              {!isCompact && <p className="text-sm text-stone-400 mb-4 line-clamp-2 leading-relaxed font-serif tracking-wide">{product.description}</p>}
              <div className="mt-auto flex items-end justify-between gap-2 pt-3 border-t border-white/5">
                <div className="flex flex-col">
                  <span className={`font-mono text-white font-bold tracking-tight text-glow ${isCompact ? 'text-lg' : 'text-2xl'}`}>
                    <span className={`text-wuxia-gold mr-0.5 ${isCompact ? 'text-xs' : 'text-base'}`}>$</span>{product.price}
                  </span>
                </div>
                <button onClick={() => onAdd(product)} className={`relative overflow-hidden bg-gradient-to-b from-wuxia-red to-wuxia-red-dark text-white rounded transition-all duration-300 font-bold shadow-lg hover:shadow-wuxia-red/50 border border-wuxia-gold/50 ${isCompact ? 'px-3 py-1 text-xs' : 'px-6 py-2 text-sm'}`}>
                  <span className="relative z-10 tracking-widest">加入行囊</span>
                </button>
              </div>
            </div>
          </div>
        );
      };

      const Modal = ({ isOpen, title, children, onClose, maxWidth = 'max-w-md' }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-modal flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={onClose}></div>
            <div className={`relative bg-[#2b1212] border-2 border-wuxia-gold w-full ${maxWidth} max-h-[90vh] flex flex-col rounded-lg shadow-[0_0_30px_rgba(0,0,0,0.8)] overflow-hidden animate-fadeIn`}>
              <div className="h-1 bg-gradient-to-r from-wuxia-gold-dark via-wuxia-gold to-wuxia-gold-dark shrink-0"></div>
              <div className="px-6 py-4 border-b border-wuxia-gold/20 flex justify-between items-center bg-black/20 shrink-0">
                <h3 className="text-xl font-bold text-wuxia-gold tracking-widest">{title}</h3>
                <button onClick={onClose} className="text-stone-500 hover:text-wuxia-red transition">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
              </div>
              <div className="p-6 overflow-y-auto custom-scrollbar">{children}</div>
            </div>
          </div>
        );
      };

      const ProfileModal = ({ isOpen, user, onClose }) => {
        const [loading, setLoading] = React.useState(false);
        const [formData, setFormData] = React.useState({ phone: '', email: '', gender: '不透露' });
        React.useEffect(() => {
          if (isOpen && user) {
            setLoading(true);
            getMemberProfileBackend(user.userId)
              .then(d => { if(d.success) setFormData({ phone: d.phone||'', email: d.email||'', gender: d.gender||'不透露' }); })
              .finally(() => setLoading(false));
          }
        }, [isOpen, user]);
        const handleSave = () => {
          setLoading(true);
          updateMemberProfileBackend({ userId: user.userId, displayName: user.displayName, phone: formData.phone, email: formData.email, gender: formData.gender })
            .then(() => { Swal.fire({ toast:true, position:'top-end', icon:'success', title:'資料已更新', timer:1500, showConfirmButton:false, background:'#2b1212', color:'#fff' }); onClose(); })
            .catch(e => Swal.fire('Error', e.message, 'error'))
            .finally(() => setLoading(false));
        };
        return (
          <Modal isOpen={isOpen} title="會員資料卡" onClose={onClose}>
            <div className="flex flex-col items-center mb-6">
              <img src={user?.pictureUrl || 'https://placehold.co/100'} className="w-20 h-20 rounded-full border-2 border-wuxia-gold shadow-lg mb-2" />
              <h3 className="text-lg font-bold text-white">{user?.displayName}</h3>
              <p className="text-xs text-stone-500">{user?.userId}</p>
            </div>
            {loading ? <div className="text-center py-4 text-wuxia-gold animate-pulse">讀取中...</div> : (
              <div className="space-y-4">
                <div><label className="block text-xs text-wuxia-gold mb-1">聯絡電話</label><input type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone:e.target.value})} className="w-full bg-black/40 border border-stone-600 rounded p-2 text-white" placeholder="09xx-xxx-xxx" /></div>

            icon: 'question',
            showCancelButton: true,
            showDenyButton: true,
            confirmButtonText: '🤖 自動推播 (LINE Bot)',
            denyButtonText: '📋 手動複製 (複製卡密)',
            cancelButtonText: '取消',
            confirmButtonColor: '#16a34a',
            denyButtonColor: '#1d4ed8',
            background: '#2b1212',
            color: '#fce7f3',

          if (pushMode === undefined) return; // 取消

                  background: '#2b1212',
                  color: '#fce7f3',

                    const btn = Swal.getConfirmButton();
                    btn.onclick = () => {
                      navigator.clipboard.writeText(result.manualMessage).catch(() => {});
                      Swal.close();
                    };

                Swal.fire({ icon: 'success', title: '發貨成功', text: result.message, background: '#2b1212', color: '#fce7f3' });

            title: '清除逾期訂單？',

            showCancelButton: true,
            confirmButtonText: '確認清除',
            cancelButtonText: '取消',
            background: '#2b1212',
            color: '#fce7f3',

            const result = await callAdminApi('clearExpiredOrders', {});
            Swal.fire({ icon: 'success', title: `已清除 ${result.count} 筆逾期訂單`, background: '#2b1212', color: '#fce7f3' });

            Swal.fire({ icon: 'error', title: '清除失敗', text: e.message, background: '#2b1212', color: '#fce7f3' });

            {data && (
              <>
                {activeTab === 'orders' && (
                  <div className="space-y-4">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-xs text-stone-500">共 {data.orders.length} 筆待處理</span>
                      <button onClick={handleClearExpired} className="px-3 py-1 bg-red-900/60 hover:bg-red-800 text-red-300 border border-red-700 rounded text-xs font-bold transition">
                        🗑️ 清除逾期訂單
                      </button>

                          <div className="flex-1 min-w-0">
                            <p className="text-wuxia-gold font-bold text-sm truncate">{ord.productName} <span className="text-stone-400 text-xs">(${ord.price})</span></p>
                            <p className="text-xs text-stone-400 truncate">{ord.orderId} | {ord.userName}</p>
                            <p className="text-xs text-stone-500">{ord.date} | 備註: <span className="text-white">{ord.paymentNote || '無'}</span></p>
                          </div>
                          <button onClick={() => handleFulfill(ord.rowIndex, ord.orderId, ord.userName)} className="bg-green-700 hover:bg-green-600 text-white px-3 py-1.5 rounded text-xs font-bold shrink-0">強制發貨</button>
                        </div>
                      ))
                    }
                  </div>
                )}
                {activeTab === 'inventory' && (
                  <div>
                    <div className="bg-stone-900 p-4 rounded mb-4 border border-stone-700">
                      <h4 className="text-sm font-bold text-wuxia-gold mb-2">新增庫存</h4>
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                        <select value={invProdId} onChange={e => setInvProdId(e.target.value)} className="bg-black border border-stone-600 rounded p-2 text-white text-xs">
                          <option value="">-- 選擇商品 --</option>
                          {data.products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}

                        <input type="text" placeholder="卡號 / Code" value={invCode} onChange={e => setInvCode(e.target.value)} className="bg-black border border-stone-600 rounded p-2 text-white text-xs" />
                        <input type="text" placeholder="密碼 (選填)" value={invPass} onChange={e => setInvPass(e.target.value)} className="bg-black border border-stone-600 rounded p-2 text-white text-xs" />
                        <button onClick={handleAddStock} className="bg-blue-700 hover:bg-blue-600 text-white rounded font-bold text-xs px-2">新增</button>
                      </div>
                    </div>
                    <div className="space-y-2 h-64 overflow-y-auto pr-2">
                      {data.inventory.map((inv, i) => (
                        <div key={i} className="flex justify-between items-center bg-black/20 p-2 rounded border border-stone-800">
                          <div className="overflow-hidden">
                            <p className="text-stone-300 text-xs font-bold truncate">{inv.productName}</p>

                            <span className="text-xs text-stone-500">{selectedIssue.date}</span>

                              <p className="text-sm text-white">{selectedIssue.reply}</p>
                            </div>

                      </div>
                    ))}
                  </div>

      const WalletModal = ({ isOpen, user, onClose, onLogin, onOpenAdmin, onCancelOrder, onReportPayment, products, onBuyAgain, onArchiveOrder }) => {
        const [orders, setOrders] = React.useState([]);
        const [loading, setLoading] = React.useState(false);
        const isAdmin = user && user.userId === ADMIN_ID;

        const loadOrders = React.useCallback(() => {
          if (!user || user.userId === 'test-user') return;
          setLoading(true);
          getMyOrders(user.userId)
            .then(data => setOrders(data))
            .catch(err => Swal.fire({ icon:'error', title:'無法讀取票券', text:err.message, background:'#2b1212', color:'#fff' }))
            .finally(() => setLoading(false));
        }, [user]);

        React.useEffect(() => { if (isOpen && user) loadOrders(); }, [isOpen, user, loadOrders]);

        // FIX #2: WalletModal 不再自帶 archiveOrder，改用 prop 傳入的統一函數
        const handleArchive = async (orderId) => {
          try {
            await onArchiveOrder(orderId);
            loadOrders(); // reload after archive
          } catch(e) {
            Swal.fire('錯誤', e.message, 'error');
          }
        };

        return (
          <Modal isOpen={isOpen} title="我的票券夾" onClose={onClose}>
            {user && (
              <div className="mb-4 p-2 bg-white/5 rounded border border-white/10 flex justify-between items-center">

                  <img src={user.pictureUrl || 'https://placehold.co/100'} className="w-8 h-8 rounded-full border border-stone-600" />
                  <div><p className="text-xs text-stone-400">目前帳號</p><p className="text-sm font-bold text-wuxia-gold">{user.displayName}</p></div>
                </div>
                <div className="flex gap-2">
                  {isAdmin && <button onClick={onOpenAdmin} className="text-xs bg-red-900/80 hover:bg-red-700 text-red-200 border border-red-500 px-2 py-1 rounded animate-pulse font-bold">進入掌門密室</button>}
                  <span className="text-[10px] text-stone-500 bg-black/50 px-2 py-1 rounded border border-stone-800">ID: {user.userId?.substring(0,6)}...</span>
                </div>
              </div>
            )}
            {user && user.userId === 'test-user' ? (
              <div className="text-center py-10">

                    <div key={idx} className={`bg-black/30 border rounded p-4 ${isExpired ? 'border-red-900/50 opacity-75' : 'border-wuxia-gold/30'}`}>

                      {isExpired && <div className="text-center py-2 text-xs text-red-400 bg-red-900/10 rounded mt-2 border border-red-900/30">⛔️ 此訂單已超過付款期限失效，請重新購買。</div>}
                      {order.status === '已發貨' && (

                              <p className="text-[11px] text-stone-500">您的卡號、卡密如下:</p>
                              <div className="flex gap-2">
                                <button onClick={() => { navigator.clipboard.writeText(order.codes); Swal.fire({toast:true, position:'top-end', icon:'success', title:'已複製全部卡密', timer:1500, showConfirmButton:false, background:'#2b1212', color:'#fff'}); }} className="text-[10px] bg-wuxia-jade/20 hover:bg-wuxia-jade/30 text-wuxia-jade px-2 py-1 rounded transition">📋 複製全部</button>
                                {!order.isArchived && <button onClick={() => handleArchive(order.orderId)} className="text-[10px] bg-blue-900/20 hover:bg-blue-900/30 text-blue-400 px-2 py-1 rounded transition">✓ 已完成儲值</button>}
                              </div>

                            <div className="bg-black/50 p-3 rounded">
                              <pre className="text-wuxia-jade font-mono text-xs whitespace-pre-wrap select-all leading-relaxed">{order.codes}</pre>
                            </div>
                            {/* 補回：密碼整合說明提示 */}
                            {order.passwords && String(order.passwords).includes('已整合') && (
                              <p className="text-[9px] text-stone-600 mt-1 text-center italic">
                                💡 {order.passwords}
                              </p>

                            {order.isArchived && <div className="mt-2 text-center"><span className="text-[10px] bg-green-900/30 text-green-400 px-2 py-1 rounded border border-green-700">✓ 已完成儲值</span></div>}
                          </div>

                      )}
                      <div className="mt-3 pt-2 border-t border-white/5 flex justify-end">
                        {currentProduct ? (
                          <button onClick={() => { onClose(); onBuyAgain(currentProduct); }} className="flex items-center gap-1 text-xs bg-wuxia-gold/10 hover:bg-wuxia-gold/20 text-wuxia-gold border border-wuxia-gold/50 px-3 py-1.5 rounded transition">🛒 再次購買</button>
                        ) : (

      };

      // NEW #4: 回報紀錄 Modal
      const IssueHistoryModal = ({ isOpen, user, onClose, onLogin, products, initialType }) => {
        const [issues, setIssues] = React.useState([]);
        const [loading, setLoading] = React.useState(false);
        const [showForm, setShowForm] = React.useState(false);
        const [type, setType] = React.useState(initialType || '充值問題');
        const [desc, setDesc] = React.useState('');
        const [relatedProduct, setRelatedProduct] = React.useState('');
        const [submitting, setSubmitting] = React.useState(false);

        // 每次開啟時，根據 initialType 設定預設類型並跳到對應頁
        React.useEffect(() => {
          if (isOpen) {
            if (initialType) setType(initialType);
            // 若是「功能建議」直接開啟表單頁
            if (initialType === '功能建議') setShowForm(true);
          }
        }, [isOpen, initialType]);

        const loadIssues = React.useCallback(() => {
          if (!user || user.userId === 'test-user') return;
          setLoading(true);
          getMyIssues(user.userId)
            .then(data => setIssues(data || []))
            .catch(console.error)
            .finally(() => setLoading(false));
        }, [user]);

        React.useEffect(() => { if (isOpen && user) loadIssues(); }, [isOpen, user, loadIssues]);

        const handleSubmit = async () => {
          if (!user || user.userId === 'test-user') return Swal.fire({ icon:'warning', title:'請先登入', confirmButtonText:'登入' }).then(r => { if(r.isConfirmed) onLogin(); });
          if (!desc.trim()) return Swal.fire({ icon:'warning', title:'請填寫描述' });
          setSubmitting(true);
          try {
            await submitIssueReport({ userId: user.userId, displayName: user.displayName, type, description: desc, productName: relatedProduct });
            Swal.fire({ toast:true, position:'top-end', icon:'success', title:'回報已送出', timer:2000, showConfirmButton:false, background:'#2b1212', color:'#fff' });
            setDesc(''); setRelatedProduct(''); setShowForm(false);
            loadIssues();
          } catch(e) {
            Swal.fire({ icon:'error', title:'發送失敗', text: e.message });
          } finally { setSubmitting(false); }
        };

        const statusMap = { '待處理': { cls:'bg-yellow-900/50 text-yellow-500 border-yellow-700', label:'待回覆' }, '已處理': { cls:'bg-green-900/50 text-green-400 border-green-700', label:'已回覆' }, '已關閉': { cls:'bg-stone-700 text-stone-400 border-stone-600', label:'已關閉' } };

        return (
          <Modal isOpen={isOpen} title="問題回報 / 功能建議" onClose={onClose}>
            {user && user.userId === 'test-user' ? (
              <div className="text-center py-10">
                <p className="text-stone-500 mb-4">請先登入以使用回報功能。</p>
                <button onClick={onLogin} className="px-6 py-2 bg-[#06C755] text-white rounded font-bold hover:bg-[#05b34c] transition">使用 LINE 登入</button>
              </div>
            ) : (
              <>
                {/* 切換按鈕 */}
                <div className="flex gap-2 mb-4">
                  <button onClick={() => setShowForm(false)} className={`flex-1 py-2 rounded font-bold text-sm transition ${!showForm ? 'bg-wuxia-red text-white' : 'bg-stone-800 text-stone-400 hover:bg-stone-700'}`}>📋 回報紀錄</button>
                  <button onClick={() => setShowForm(true)} className={`flex-1 py-2 rounded font-bold text-sm transition ${showForm ? 'bg-wuxia-red text-white' : 'bg-stone-800 text-stone-400 hover:bg-stone-700'}`}>✏️ 新增回報</button>
                </div>

                {/* 回報表單 */}
                {showForm && (
                  <div className="space-y-4 animate-fadeIn">
                    <div>
                      <label className="block text-xs text-wuxia-gold mb-1">問題類型</label>
                      <select value={type} onChange={e => setType(e.target.value)} className="w-full bg-black/40 border border-stone-600 rounded p-2 text-stone-200 outline-none">
                        <option value="充值問題">充值問題</option>
                        <option value="序號無效">序號無效</option>
                        <option value="商品建議">商品建議</option>
                        <option value="功能建議">功能建議</option>
                        <option value="其他">其他</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs text-wuxia-gold mb-1">相關商品</label>
                      <select value={relatedProduct} onChange={e => setRelatedProduct(e.target.value)} className="w-full bg-black/40 border border-stone-600 rounded p-2 text-stone-200 outline-none">
                        <option value="">-- 請選擇 (若無可不選) --</option>
                        {products && products.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                        <option value="General">一般/系統問題</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs text-wuxia-gold mb-1">詳細描述</label>
                      <textarea value={desc} onChange={e => setDesc(e.target.value)} rows={4} className="w-full bg-black/40 border border-stone-600 rounded p-2 text-stone-200 outline-none" placeholder="請詳細描述您遇到的問題..." />
                    </div>
                    <button onClick={handleSubmit} disabled={submitting} className="w-full py-2 bg-wuxia-red hover:bg-wuxia-red-dark text-white rounded font-bold transition disabled:opacity-50">
                      {submitting ? '發送中...' : '提交回報'}
                    </button>
                  </div>
                )}

                {/* 回報紀錄列表 */}
                {!showForm && (
                  <div>
                    {loading ? (
                      <div className="text-center py-8 text-wuxia-gold animate-pulse">讀取中...</div>
                    ) : issues.length === 0 ? (
                      <div className="text-center py-10 text-stone-500">
                        <p className="mb-4">尚無回報紀錄</p>
                        <button onClick={() => setShowForm(true)} className="px-4 py-2 bg-wuxia-red text-white rounded font-bold text-sm hover:bg-wuxia-red-dark transition">立即回報問題</button>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {issues.map((issue, i) => {
                          const s = statusMap[issue.status] || statusMap['待處理'];
                          return (
                            <div key={i} className="bg-black/30 border border-stone-800 rounded p-4 space-y-2">
                              <div className="flex justify-between items-start">
                                <div className="flex items-center gap-2 flex-wrap">
                                  <span className="text-wuxia-gold text-sm font-bold">{issue.type}</span>
                                  {issue.productName && issue.productName !== '無' && <span className="text-[10px] text-stone-500 bg-stone-800 px-1 rounded">{issue.productName}</span>}
                                  <span className={`text-[10px] border px-1 rounded ${s.cls}`}>{s.label}</span>
                                </div>
                                <span className="text-[10px] text-stone-600 shrink-0">{issue.date}</span>
                              </div>
                              <p className="text-sm text-stone-300 bg-black/20 p-2 rounded">{issue.description}</p>
                              {issue.reply && (
                                <div className="mt-2 p-3 bg-wuxia-gold/10 border border-wuxia-gold/30 rounded">
                                  <p className="text-[10px] text-wuxia-gold mb-1 font-bold">🛡️ 客服回覆</p>
                                  <p className="text-sm text-white">{issue.reply}</p>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </>
            )}
          </Modal>
        );
      };

      // ==========================================
      // App
      // ==========================================
      const App = () => {
        const [products, setProducts] = React.useState([]);
        const [user, setUser] = React.useState(null);
        const [loading, setLoading] = React.useState(true);
        const [error, setError] = React.useState(null);
        const [cart, setCart] = React.useState([]);
        const [showCart, setShowCart] = React.useState(false);
        const [cartTotal, setCartTotal] = React.useState(0);
        const [tempProduct, setTempProduct] = React.useState(null);
        const [tempQty, setTempQty] = React.useState(1);
        const [showBankInfo, setShowBankInfo] = React.useState(false);
        const [paymentNote, setPaymentNote] = React.useState('');
        const [currentOrderId, setCurrentOrderId] = React.useState(null);
        const [currentOrderPrice, setCurrentOrderPrice] = React.useState(0);
        const [showReport, setShowReport] = React.useState(false);
        const [reportInitType, setReportInitType] = React.useState('充值問題'); // 保留初始類型
        const [showWallet, setShowWallet] = React.useState(false);
        const [showAdmin, setShowAdmin] = React.useState(false);
        const [showGuide, setShowGuide] = React.useState(false);
        const [showProfile, setShowProfile] = React.useState(false);
        const [isProcessing, setIsProcessing] = React.useState(false);
        const [activeCategory, setActiveCategory] = React.useState('全部');
        const [unreadCount, setUnreadCount] = React.useState(0);
        // 商品格線欄數：手機預設1欄(最多2)，桌面最多4欄
        const [gridCols, setGridCols] = React.useState(1);

        React.useEffect(() => {
          setCartTotal(cart.reduce((sum, item) => sum + item.product.price * item.quantity, 0));
        }, [cart]);

        const loginWithLiffUrl = () => { window.top.location.href = LIFF_URL; };

        const initLiff = React.useCallback(async () => {
          try {
            if (!window.liff) throw new Error("LIFF SDK 未載入");
            await window.liff.init({ liffId: LIFF_ID });
            if (window.liff.isLoggedIn()) {
              const profile = await window.liff.getProfile();
              const userData = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl, os: window.liff.getOS() };
              setUser(userData);
              logUserToBackend(userData);
            } else {
              setUser({ userId: 'test-user', displayName: '訪客', pictureUrl: '', os: 'web' });
            }
            const hasSeenGuide = localStorage.getItem('game_equation_hide_guide_v2');
            if (!hasSeenGuide) setShowGuide(true);
          } catch(err) {
            console.error('LIFF Error:', err);
            setUser({ userId: 'test-user', displayName: '離線測試員', pictureUrl: '', os: 'web' });
            setError('LIFF 初始化失敗');
          }
        }, []);

        const fetchProducts = React.useCallback(async () => {
          setLoading(true);
          try { const data = await getProducts(); setProducts(data); }
          catch(err) { setError('無法讀取商品列表'); }
          finally { setLoading(false); }
        }, []);

        const checkOrders = React.useCallback(async () => {
          if (!user || user.userId === 'test-user') return;
          try {
            const orders = await getMyOrders(user.userId);
            const pendingOrder = orders.find(o => { if (o.status !== '待處理') return false; return (Date.now() - new Date(o.date).getTime()) < 30*60*1000; });
            if (pendingOrder) {
              setCurrentOrderId(pendingOrder.orderId);
              setCurrentOrderPrice(pendingOrder.price);
              setShowBankInfo(true);
              Swal.fire({ toast:true, position:'top-end', icon:'info', title:'您有一筆待付款訂單', text:'請儘速完成轉帳', showConfirmButton:false, timer:3000, background:'#2b1212', color:'#fff' });
            }
            const completedOrders = orders.filter(o => o.status === '已發貨').map(o => o.orderId);
            const lastKnownCount = parseInt(localStorage.getItem('game_equation_seen_count') || '0', 10);
            if (completedOrders.length > lastKnownCount) {
              setUnreadCount(completedOrders.length - lastKnownCount);
              Swal.fire({ toast:true, position:'top-end', icon:'success', title:'寶物已送達！', text:'請至票券夾查收', showConfirmButton:false, timer:4000, background:'#2b1212', color:'#fff' });
            }
          } catch(e) { console.error(e); }
        }, [user]);

        React.useEffect(() => { initLiff(); fetchProducts(); }, [initLiff, fetchProducts]);
        React.useEffect(() => { if (user) checkOrders(); }, [user, checkOrders]);

        const filteredProducts = React.useMemo(() => {
          if (activeCategory === '全部') return products;
          return products.filter(p => (p.category || '').trim() === activeCategory);
        }, [products, activeCategory]);

        const categories = ['全部', '電腦遊戲', '手機遊戲', '網頁遊戲'];

        const openAddToCart = (product) => { setTempProduct(product); setTempQty(1); };

        const confirmAddToCart = () => {
          if (!tempProduct) return;
          setCart(prev => {
            const existing = prev.find(i => i.product.id === tempProduct.id);
            if (existing) return prev.map(i => i.product.id === tempProduct.id ? {...i, quantity: i.quantity + tempQty} : i);
            return [...prev, { product: tempProduct, quantity: tempQty }];
          });
          setTempProduct(null);
          Swal.fire({ toast:true, position:'top-end', icon:'success', title:'已加入行囊', showConfirmButton:false, timer:1500, background:'#2b1212', color:'#fff' });
        };

        const removeFromCart = (productId) => setCart(prev => prev.filter(i => i.product.id !== productId));
        const updateCartQuantity = (productId, delta) => setCart(prev => prev.map(i => i.product.id === productId ? {...i, quantity: Math.max(1, i.quantity + delta)} : i));

        const submitOrder = async () => {
          if (cart.length === 0) return;
          if (!user || user.userId === 'test-user') {
            Swal.fire({ icon:'info', title:'請先登入', showCancelButton:true, confirmButtonText:'LINE 登入' }).then(r => { if(r.isConfirmed) loginWithLiffUrl(); });
            return;
          }
          setIsProcessing(true);
          try {
            const result = await withTimeout(processCartOrderBackend({ userId: user.userId, displayName: user.displayName }, "", cart), 30000);
            if (result.success) {
              // NEW #2: LINE LIFF 通知 - 訂單建立確認
              if (window.liff && window.liff.isInClient()) {
                let messageText = `【訂單已成立 - 請儘速付款】\n`;
                messageText += `━━━━━━━━━━━━━━━\n`;
                messageText += `📝 訂單編號: ${result.orderId}\n`;
                messageText += `💰 訂單金額: $${cartTotal}\n`;
                messageText += `🎮 購買商品:\n`;
                // FIX #6: result.items 加防護
                (result.items || []).forEach((item, index) => {
                  messageText += `  ${index+1}. ${item.name}\n`;
                  if (item.category) messageText += `     類型: ${item.category}\n`;
                  messageText += `     數量: x${item.quantity}\n`;
                });
                messageText += `\n━━━━━━━━━━━━━━━\n`;
                messageText += `💳 匯款帳號:\n`;
                messageText += `${BANK_INFO.name} (${BANK_INFO.code})\n`;
                messageText += `${BANK_INFO.account}\n`;
                messageText += `\n⏰ 請於30分鐘內完成付款\n`;
                messageText += `📱 完成後請在網頁回報「帳號後五碼」\n`;
                messageText += `🎁 系統確認後自動發送商品到票券夾`;
                try { await window.liff.sendMessages([{ type:'text', text: messageText }]); } catch(e) { console.error('LINE訊息發送失敗:', e); }
              }
              setCart([]);
              setCurrentOrderId(result.orderId);
              setCurrentOrderPrice(cartTotal);
              setShowCart(false);
              setShowBankInfo(true);
            } else {
              Swal.fire({ icon:'error', title:'訂單建立失敗', text: result.message });
            }
          } catch(err) {
            Swal.fire({ icon:'error', title:'系統繁忙', text: err.message });
          } finally { setIsProcessing(false); }
        };

        const confirmPaymentInfo = async () => {
          if (!paymentNote.trim()) return Swal.fire({ icon:'warning', title:'請輸入後五碼' });
          if (!currentOrderId) return Swal.fire({ icon:'error', title:'訂單編號遺失，請重新整理' });
          setIsProcessing(true);
          try {
            const result = await updateOrderPaymentBackend(user.userId, currentOrderId, paymentNote);
            if (result.success) {
              setShowBankInfo(false); setPaymentNote(''); setCurrentOrderId(null);
              Swal.fire({ icon:'success', title:'付款資訊已更新', html:'<p class="text-stone-300">系統正在核對款項。<br/>核對成功後商品將自動發送到票券夾。</p>', confirmButtonText:'好的，我去票券夾看看' })
                .then(r => { if(r.isConfirmed) setShowWallet(true); });
            } else {
              Swal.fire({ icon:'error', title:'更新失敗', text: result.message });
            }
          } catch(err) { Swal.fire({ icon:'error', title:'連線錯誤', text: err.message }); }
          finally { setIsProcessing(false); }
        };

        const copyToClipboard = (text) => {
          if (navigator.clipboard) { navigator.clipboard.writeText(text); Swal.fire({ toast:true, position:'top-end', icon:'success', title:'已複製', timer:1500, showConfirmButton:false, background:'#2b1212', color:'#fff' }); }
        };

        const handleWalletReportPayment = (orderId, price) => { setCurrentOrderId(orderId); setCurrentOrderPrice(price); setShowWallet(false); setShowBankInfo(true); };

        const handleWalletCancelOrder = async (orderId) => {
          const r = await Swal.fire({ title:'取消訂單？', text:'確定要取消這筆尚未付款的訂單嗎？', icon:'warning', showCancelButton:true, confirmButtonText:'確定取消', cancelButtonText:'保留', background:'#2b1212', color:'#fff' });
          if (r.isConfirmed) {
            try {
              const result = await cancelOrderBackend(user.userId, orderId);
              if (result.success) { Swal.fire({icon:'success', title:'已取消', timer:1500, showConfirmButton:false}); setShowWallet(false); }
              else Swal.fire({icon:'error', title:'取消失敗', text:result.message});
            } catch(e) { Swal.fire({icon:'error', title:'錯誤', text:e.message}); }
          }
        };

        // FIX #2: App 層統一的 archiveOrder，傳給 WalletModal
        const handleArchiveOrder = async (orderId) => {
          const result = await archiveOrderBackend(user.userId, orderId);
          if (result.success) {
            Swal.fire({ toast:true, position:'top-end', icon:'success', title:'已標記為完成儲值', timer:1500, showConfirmButton:false, background:'#2b1212', color:'#fff' });
          }
          return result;
        };

        const handleOpenWallet = () => {
          if (!user || user.userId === 'test-user') {
            return Swal.fire({icon:'info', title:'請先登入', showCancelButton:true, confirmButtonText:'LINE 登入'}).then(r => { if(r.isConfirmed) loginWithLiffUrl(); });
          }
          setUnreadCount(0);
          getMyOrders(user.userId).then(orders => {
            const count = orders.filter(o => o.status === '已發貨').length;
            localStorage.setItem('game_equation_seen_count', count.toString());
          });
          setShowWallet(true);
        };

        // 格線 class：手機永遠最多2欄，預設1欄；桌面依滑軌最多4欄
        const getGridClass = (cols) => {
          const map = {
            1: 'grid grid-cols-1 gap-6',
            2: 'grid grid-cols-2 gap-5',
            3: 'grid grid-cols-2 sm:grid-cols-3 gap-5',
            4: 'grid grid-cols-2 sm:grid-cols-4 gap-4',
          };
          return map[cols] || map[1];
        };

        return (
          <div className="min-h-screen pb-20">
            <Navbar
              user={user}
              cartCount={cart.reduce((a,b)=>a+b.quantity,0)}
              unreadCount={unreadCount}
              onReport={() => { setReportInitType('充值問題'); setShowReport(true); }}
              onSuggest={() => { setReportInitType('功能建議'); setShowReport(true); }}
              onWallet={handleOpenWallet}
              onProfile={() => setShowProfile(true)}
              onOpenCart={() => setShowCart(true)}
              onLogin={loginWithLiffUrl}
            />
            <AnnouncementBar />
            <main className="container mx-auto px-4 pt-28">
              <div className="mb-12 text-center relative">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-wuxia-red/20 blur-[80px] rounded-full -z-10 animate-pulse"></div>
                <h1 className="text-4xl md:text-5xl font-extrabold text-white mb-3 tracking-tight">
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-wuxia-gold via-yellow-100 to-wuxia-gold drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">遊戲方程式</span>
                  <p className="text-sm text-wuxia-gold/80 mb-1 font-serif tracking-widest mt-2">釋放你的雙手</p>
                  <span className="block text-xl mt-1 font-normal text-red-300 font-serif tracking-widest">虛寶補給自動發貨站</span>
                </h1>
                <div className="sm:hidden mt-4 flex justify-center gap-4">
                  {user && user.userId !== 'test-user' && <button onClick={handleOpenWallet} className="text-xs text-wuxia-gold underline">我的票券夾</button>}
                  <button onClick={() => { setReportInitType('充值問題'); setShowReport(true); }} className="text-xs text-wuxia-red underline">遇到問題？</button>
                  <button onClick={() => { setReportInitType('功能建議'); setShowReport(true); }} className="text-xs text-blue-400 underline">功能建議</button>
                </div>
              </div>

              {/* 分類篩選 */}
              <div className="flex justify-center mb-6 gap-4 flex-wrap">
                {categories.map(cat => (
                  <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-6 py-2 rounded border transition-all duration-300 font-bold text-sm tracking-wider transform ${activeCategory===cat ? 'bg-wuxia-red text-white border-wuxia-red shadow-[0_0_15px_rgba(220,38,38,0.5)] scale-110' : 'bg-transparent text-stone-500 border-stone-700 hover:border-stone-400 hover:text-stone-300'}`}>{cat}</button>
                ))}
              </div>

              {/* 商品格線滑軌：1-4欄，手機最多顯示2欄 */}
              <div className="flex items-center justify-end gap-3 mb-6 px-2">
                <span className="text-xs text-stone-600 hidden sm:block">商品大小</span>
                <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3 text-stone-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                <input
                  type="range" min="1" max="4" step="1"
                  value={gridCols}
                  onChange={e => setGridCols(Number(e.target.value))}
                  className="w-20 h-1.5 accent-wuxia-gold cursor-pointer"
                  title="調整一排顯示商品數"
                />
                <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
                <span className="text-xs text-stone-500 w-10 text-right">
                  {gridCols === 1 ? '大圖' : gridCols === 2 ? '兩欄' : gridCols === 3 ? '三欄' : '四欄'}
                </span>
              </div>

              {error && <div className="bg-red-900/30 border border-red-800 text-red-300 p-4 rounded-lg text-center mb-6">{error}</div>}
              {loading ? (
                <div className="flex justify-center items-center h-64 flex-col gap-4">
                  <div className="animate-spin rounded-full h-12 w-12 border-4 border-wuxia-card border-t-wuxia-gold"></div>
                  <p className="text-wuxia-gold text-sm tracking-widest animate-pulse">正在讀取卷軸...</p>
                </div>
              ) : (
                filteredProducts.length === 0 ? (
                  <div className="text-center py-20 text-stone-600 border-2 border-dashed border-stone-800 rounded-lg">此分類目前沒有寶物</div>
                ) : (
                  <div className={getGridClass(gridCols)}>
                    {filteredProducts.map(product => (
                      <ProductCard key={product.id} product={product} onAdd={openAddToCart} colCount={gridCols} />
                    ))}
                  </div>
                )
              )}
            </main>

            {/* 加入行囊 Modal */}
            <Modal isOpen={!!tempProduct} title="加入行囊" onClose={() => setTempProduct(null)}>
              {tempProduct && (
                <div className="text-center space-y-4">
                  <div className="w-full h-32 rounded border border-wuxia-gold/30 overflow-hidden mb-4 bg-black"><img src={tempProduct.imageUrl} alt={tempProduct.name} className="w-full h-full object-cover opacity-80" /></div>
                  <h3 className="text-xl font-bold text-white">{tempProduct.name}</h3>
                  <div className="flex items-center justify-center gap-4 my-4">
                    <button onClick={() => setTempQty(Math.max(1, tempQty-1))} className="w-8 h-8 rounded bg-stone-700 text-white font-bold hover:bg-wuxia-red transition">-</button>
                    <span className="text-xl font-mono font-bold text-wuxia-gold w-8">{tempQty}</span>
                    <button onClick={() => setTempQty(Math.min(10, tempQty+1))} className="w-8 h-8 rounded bg-stone-700 text-white font-bold hover:bg-wuxia-red transition">+</button>
                  </div>
                  <div className="bg-black/40 px-6 py-2 rounded-full border border-wuxia-gold/30 inline-block">
                    <p className="text-stone-400 text-xs">小計</p>
                    <p className="text-2xl text-wuxia-gold font-mono font-bold">${tempProduct.price * tempQty}</p>
                  </div>
                  <div className="flex gap-4 mt-8">
                    <button onClick={() => setTempProduct(null)} className="flex-1 px-4 py-3 rounded border border-stone-600 text-stone-400 hover:bg-stone-800 transition text-sm">取消</button>
                    <button onClick={confirmAddToCart} className="flex-1 px-4 py-3 rounded bg-gradient-to-r from-wuxia-red to-wuxia-red-dark text-white font-bold shadow-lg border border-wuxia-gold/30">確認加入</button>
                  </div>
                </div>
              )}
            </Modal>

            {/* 購物車 Modal */}
            <Modal isOpen={showCart} title="我的行囊" onClose={() => setShowCart(false)}>
              {cart.length === 0 ? <div className="text-center py-10 text-stone-500">行囊空空如也</div> : (
                <div className="space-y-4">
                  {cart.map((item, idx) => (
                    <div key={idx} className="bg-black/30 p-3 rounded border border-stone-800 flex flex-col gap-3">
                      <div className="flex justify-between items-start">
                        <div className="flex items-center gap-3">
                          <img src={item.product.imageUrl} className="w-12 h-12 object-cover rounded border border-stone-600" />
                          <div><p className="text-white text-sm font-bold line-clamp-1">{item.product.name}</p><p className="text-stone-400 text-xs font-mono">${item.product.price} / 單位</p></div>
                        </div>
                        <button onClick={() => removeFromCart(item.product.id)} className="text-stone-500 hover:text-red-500 p-1">
                          <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                      </div>
                      <div className="flex justify-between items-center pl-[60px]">
                        <div className="flex items-center bg-stone-900 border border-stone-700 rounded h-8">
                          <button onClick={() => updateCartQuantity(item.product.id, -1)} className="w-8 h-full flex items-center justify-center text-stone-400 hover:text-white hover:bg-stone-700 rounded-l transition">-</button>
                          <span className="w-10 text-center text-wuxia-gold font-mono font-bold text-sm border-x border-stone-700">{item.quantity}</span>
                          <button onClick={() => updateCartQuantity(item.product.id, 1)} className="w-8 h-full flex items-center justify-center text-stone-400 hover:text-white hover:bg-stone-700 rounded-r transition">+</button>
                        </div>
                        <span className="text-wuxia-gold font-mono font-bold text-lg">${item.product.price * item.quantity}</span>
                      </div>
                    </div>
                  ))}
                  <div className="border-t border-white/10 pt-4 flex justify-between items-end">
                    <span className="text-stone-400">總金額</span>
                    <span className="text-3xl text-wuxia-gold font-mono font-bold">${cartTotal}</span>
                  </div>
                  <button onClick={submitOrder} disabled={isProcessing} className="w-full mt-4 py-3 bg-gradient-to-r from-wuxia-red to-wuxia-red-dark text-white rounded font-bold shadow-lg hover:shadow-wuxia-red/30 transition disabled:opacity-70">
                    {isProcessing ? '訂單建立中...' : '提交訂單 (前往付款)'}
                  </button>
                  <p className="text-xs text-red-400 mt-2 text-center animate-pulse">⚠️ 提醒：提交後請於 30 分鐘內完成轉帳，逾時訂單失效！</p>
                </div>
              )}
            </Modal>

            {/* 付款資訊 Modal */}
            <Modal isOpen={showBankInfo} title="付款資訊" onClose={() => !isProcessing && setShowBankInfo(false)}>
              <div className="space-y-6">
                <div className="text-center bg-wuxia-gold/10 p-3 rounded border border-wuxia-gold/30">
                  <p className="text-wuxia-gold text-xs font-bold">訂單已成立，請儘速付款</p>
                  <p className="text-stone-400 text-[10px] mt-1">單號：{currentOrderId}</p>
                </div>
                <div className="bg-red-900/20 border border-red-800 p-2 rounded text-center">
                  <p className="text-xs text-red-300 font-bold animate-pulse">⚠️ 請於 30 分鐘內完成轉帳，逾時訂單將自動失效</p>
                </div>
                <p className="text-stone-300 text-sm text-center">請匯款 <span className="text-wuxia-gold font-bold">${cartTotal || currentOrderPrice}</span> 至以下帳戶：</p>
                <div className="bg-gradient-to-br from-stone-900 to-black p-5 rounded-lg border border-wuxia-gold/50 relative overflow-hidden shadow-inner">
                  <div className="absolute top-0 right-0 p-2 opacity-20 text-6xl text-white font-serif italic font-bold select-none">Bank</div>
                  <div className="relative z-10 space-y-3">
                    <div className="flex justify-between items-end border-b border-white/10 pb-2"><span className="text-stone-400 text-xs">銀行代碼</span><span className="text-xl font-mono text-white font-bold">{BANK_INFO.code}</span></div>
                    <div className="flex justify-between items-end border-b border-white/10 pb-2"><span className="text-stone-400 text-xs">銀行名稱</span><span className="text-lg text-white font-bold">{BANK_INFO.name}</span></div>
                    <div className="pt-1">
                      <span className="text-stone-400 text-xs block mb-1">匯款帳號</span>
                      <div className="flex items-center justify-between bg-black/50 p-2 rounded border border-wuxia-gold/20">
                        <span className="text-2xl font-mono text-wuxia-gold tracking-widest">{BANK_INFO.account}</span>
                        <button onClick={() => copyToClipboard(BANK_INFO.account)} className="ml-2 px-3 py-1 bg-stone-700 hover:bg-wuxia-gold hover:text-black text-xs text-white rounded transition">複製</button>
                      </div>
                    </div>
                  </div>
                </div>
                <div className="space-y-3 pt-2">
                  <label className="block text-sm text-wuxia-gold font-bold">付款回報</label>
                  <div className="text-xs text-stone-500 mb-1">請輸入您轉帳帳號的後五碼，以便系統對帳。</div>
                  <input type="text" placeholder="輸入後五碼" value={paymentNote} onChange={e => setPaymentNote(e.target.value)} className="w-full bg-black/40 border border-stone-600 rounded p-3 text-white focus:border-wuxia-gold outline-none text-center font-mono tracking-widest text-lg placeholder:text-stone-600" maxLength={5} />
                </div>
                <div className="flex gap-4 mt-4">
                  <button onClick={() => setShowBankInfo(false)} className="px-4 py-3 rounded border border-stone-600 text-stone-400 hover:bg-stone-800 transition text-sm">稍後回報</button>
                  <button onClick={confirmPaymentInfo} disabled={isProcessing} className={`flex-1 px-4 py-3 rounded bg-gradient-to-r from-wuxia-red to-wuxia-red-dark text-white font-bold transition shadow-lg border border-wuxia-gold/30 ${isProcessing ? 'opacity-70 cursor-not-allowed' : ''}`}>
                    {isProcessing ? '更新中...' : '已匯款，送出資訊'}
                  </button>
                </div>
                <div className="text-center text-[10px] text-stone-600 mt-2">若您現在不方便付款，可關閉此視窗。<br/>您的訂單已保留，請記得在「票券夾」查看狀態。</div>
              </div>
            </Modal>

            {/* NEW #4: 問題回報 + 紀錄 Modal (合一) */}
            <IssueHistoryModal
              isOpen={showReport}
              user={user}
              onClose={() => setShowReport(false)}
              onLogin={loginWithLiffUrl}
              products={products}
              initialType={reportInitType}
            />

            <WalletModal
              isOpen={showWallet}
              user={user}
              onClose={() => setShowWallet(false)}
              onLogin={loginWithLiffUrl}
              onOpenAdmin={() => { setShowWallet(false); setShowAdmin(true); }}
              onCancelOrder={handleWalletCancelOrder}
              onReportPayment={handleWalletReportPayment}
              products={products}
              onBuyAgain={openAddToCart}
              onArchiveOrder={handleArchiveOrder}
            />
            <ProfileModal isOpen={showProfile} user={user} onClose={() => setShowProfile(false)} />
            {showAdmin && <AdminModal isOpen={showAdmin} onClose={() => setShowAdmin(false)} />}
            {showGuide && <GuideModal isOpen={showGuide} onClose={() => setShowGuide(false)} />}
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<React.StrictMode><App /></React.StrictMode>);
      }
    </script>
  </body>
</html>
