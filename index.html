      const CountdownTimer = ({ targetDate, onExpire }) => {
         const [timeLeft, setTimeLeft] = React.useState('');
         const [isUrgent, setIsUrgent] = React.useState(false);

         React.useEffect(() => {
            const interval = setInterval(() => {
               const now = new Date().getTime();
               const distance = targetDate - now;

               if (distance < 0) {
                  clearInterval(interval);
                  setTimeLeft('EXPIRED');
                  if(onExpire) onExpire();
               } else {
                  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                  const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                  setTimeLeft(`${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`);
                  if (distance < 5 * 60 * 1000) setIsUrgent(true);
               }
            }, 1000);
            return () => clearInterval(interval);
         }, [targetDate]);

         if (timeLeft === 'EXPIRED') return <span className="text-stone-500 text-xs font-bold bg-stone-800 px-2 py-1 rounded">⚠️ 訂單已過期</span>;

         return (
            <div className={`flex items-center gap-1 ${isUrgent ? 'animate-pulse' : ''}`}>
               <span className="text-[10px] text-stone-400">剩餘時間</span>
               <span className={`font-mono font-bold text-sm ${isUrgent ? 'text-red-500' : 'text-wuxia-gold'}`}>{timeLeft}</span>

         );

                    {user && user.userId !== 'test-user' && <button onClick={handleOpenWallet} className="text-xs text-wuxia-gold underline">我的票券夾</button>}
                    <button onClick={() => { setReportInitType('充值問題'); setShowReport(true); }} className="text-xs text-wuxia-red underline">遇到問題？</button>
                    <button onClick={() => { setReportInitType('功能建議'); setShowReport(true); }} className="text-xs text-blue-400 underline">功能建議</button>
                </div>
              </div>

              <div className="flex justify-center mb-10 gap-4">
                {categories.map(cat => (
                  <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-6 py-2 rounded border transition-all duration-300 font-bold text-sm tracking-wider transform ${activeCategory === cat ? 'bg-wuxia-red text-white border-wuxia-red shadow-[0_0_15px_rgba(220,38,38,0.5)] scale-110' : 'bg-transparent text-stone-500 border-stone-700 hover:border-stone-400 hover:text-stone-300'}`}>{cat}</button>
                ))}
              </div>

              {error && <div className="bg-red-900/30 border border-red-800 text-red-300 p-4 rounded-lg text-center mb-6 whitespace-pre-wrap">{error}</div>}

              {loading ? (
                <div className="flex justify-center items-center h-64 flex-col gap-4"><div className="animate-spin rounded-full h-12 w-12 border-4 border-wuxia-card border-t-wuxia-gold"></div><p className="text-wuxia-gold text-sm tracking-widest animate-pulse">正在讀取卷軸...</p></div>
              ) : (
                <>
                  {filteredProducts.length === 0 ? <div className="text-center py-20 text-stone-600 border-2 border-dashed border-stone-800 rounded-lg">此分類目前沒有寶物</div> : (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">{filteredProducts.map((product) => (<ProductCard key={product.id} product={product} onAdd={openAddToCart} />))}</div>
                  )}
                </>
              )}
            </main>

            <Modal isOpen={!!tempProduct} title="加入行囊" onClose={() => setTempProduct(null)}>
                {tempProduct && (
                  <div className="text-center space-y-4">
                    <div className="w-full h-32 rounded border border-wuxia-gold/30 overflow-hidden mb-4 relative bg-black"><img src={tempProduct.imageUrl} alt={tempProduct.name} className="w-full h-full object-cover opacity-80" /></div>
                    <h3 className="text-xl font-bold text-white tracking-wide">{tempProduct.name}</h3>
                    <div className="flex items-center justify-center gap-4 my-4">
                        <button onClick={() => setTempQty(Math.max(1, tempQty - 1))} className="w-8 h-8 rounded bg-stone-700 text-white font-bold hover:bg-wuxia-red transition">-</button>
                        <span className="text-xl font-mono font-bold text-wuxia-gold w-8">{tempQty}</span>
                        <button onClick={() => setTempQty(Math.min(10, tempQty + 1))} className="w-8 h-8 rounded bg-stone-700 text-white font-bold hover:bg-wuxia-red transition">+</button>
                    </div>
                    <div className="bg-black/40 px-6 py-2 rounded-full border border-wuxia-gold/30 inline-block"><p className="text-stone-400 text-xs">小計</p><p className="text-2xl text-wuxia-gold font-mono font-bold">${tempProduct.price * tempQty}</p></div>
                    <div className="flex gap-4 mt-8">
                      <button onClick={() => setTempProduct(null)} className="flex-1 px-4 py-3 rounded border border-stone-600 text-stone-400 hover:bg-stone-800 transition text-sm">取消</button>
                      <button onClick={confirmAddToCart} className="flex-1 px-4 py-3 rounded bg-gradient-to-r from-wuxia-red to-wuxia-red-dark text-white font-bold transition flex justify-center items-center shadow-lg hover:shadow-wuxia-red/30 border border-wuxia-gold/30">確認加入</button>
                    </div>
                  </div>
                )}
            </Modal>

            <Modal isOpen={showCart} title="我的行囊" onClose={() => setShowCart(false)}>
               {cart.length === 0 ? <div className="text-center py-10 text-stone-500">行囊空空如也</div> : (
                  <div className="space-y-4">
                     {cart.map((item, idx) => (
                        <div key={idx} className="bg-black/30 p-3 rounded border border-stone-800 flex flex-col gap-3">
                           <div className="flex justify-between items-start">
                              <div className="flex items-center gap-3"><img src={item.product.imageUrl} className="w-12 h-12 object-cover rounded border border-stone-600"/><div className="flex-1"><p className="text-white text-sm font-bold line-clamp-1">{item.product.name}</p><p className="text-stone-400 text-xs font-mono">${item.product.price} / 單位</p></div></div>
                              <button onClick={() => removeFromCart(item.product.id)} className="text-stone-500 hover:text-red-500 p-1"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                           </div>
                           <div className="flex justify-between items-center pl-[60px]">
                              <div className="flex items-center bg-stone-900 border border-stone-700 rounded h-8"><button onClick={() => updateCartQuantity(item.product.id, -1)} className="w-8 h-full flex items-center justify-center text-stone-400 hover:text-white hover:bg-stone-700 rounded-l transition">-</button><span className="w-10 text-center text-wuxia-gold font-mono font-bold text-sm border-x border-stone-700">{item.quantity}</span><button onClick={() => updateCartQuantity(item.product.id, 1)} className="w-8 h-full flex items-center justify-center text-stone-400 hover:text-white hover:bg-stone-700 rounded-r transition">+</button></div>
                              <span className="text-wuxia-gold font-mono font-bold text-lg">${item.product.price * item.quantity}</span>
                           </div>
                        </div>
                     ))}
                     <div className="border-t border-white/10 pt-4 mt-4 flex justify-between items-end"><span className="text-stone-400">總金額</span><span className="text-3xl text-wuxia-gold font-mono font-bold">${cartTotal}</span></div>
                     
                     <div className="mt-4 space-y-3">
                        <label className="block text-sm font-bold text-wuxia-gold">付款方式</label>
                        <div className="flex gap-4">
                           <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="paymentMethod" value="bank" checked={paymentMethod === 'bank'} onChange={(e) => setPaymentMethod(e.target.value)} className="text-wuxia-red focus:ring-wuxia-red bg-stone-900 border-stone-700" />
                              <span className="text-stone-300 text-sm">銀行轉帳</span>
                           </label>
                           <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="paymentMethod" value="mycard" checked={paymentMethod === 'mycard'} onChange={(e) => setPaymentMethod(e.target.value)} className="text-wuxia-red focus:ring-wuxia-red bg-stone-900 border-stone-700" />
                              <span className="text-stone-300 text-sm">MyCard 點數支付</span>
                           </label>
                        </div>
                        
                        {paymentMethod === 'mycard' && (
                           <div className="space-y-3 bg-black/40 p-4 rounded border border-stone-800 mt-2">
                              <p className="text-xs text-stone-400 mb-2">請輸入對應面額的 MyCard 卡號與密碼，我們將進行人工審核發卡。</p>
                              <div>
                                 <label className="block text-xs text-stone-400 mb-1">MyCard 卡號</label>
                                 <input type="text" value={myCardNumber} onChange={(e) => setMyCardNumber(e.target.value)} className="w-full bg-stone-900 border border-stone-700 rounded p-2 text-white text-sm focus:border-wuxia-gold focus:outline-none" placeholder="輸入卡號" />
                              </div>
                              <div>
                                 <label className="block text-xs text-stone-400 mb-1">MyCard 密碼</label>
                                 <input type="text" value={myCardPassword} onChange={(e) => setMyCardPassword(e.target.value)} className="w-full bg-stone-900 border border-stone-700 rounded p-2 text-white text-sm focus:border-wuxia-gold focus:outline-none" placeholder="輸入密碼" />
                              </div>
                           </div>
                        )}
                     </div>

                     <button onClick={submitOrder} disabled={isProcessing} className="w-full mt-4 py-3 bg-gradient-to-r from-wuxia-red to-wuxia-red-dark text-white rounded font-bold shadow-lg hover:shadow-wuxia-red/30 transition">{isProcessing ? '處理中...' : (paymentMethod === 'mycard' ? '提交點數卡兌換' : '提交訂單 (前往付款)')}</button>
                     {paymentMethod === 'bank' && <p className="text-xs text-red-400 mt-2 text-center animate-pulse">⚠️ 提醒：提交訂單後請於 30 分鐘內完成轉帳，以免訂單失效或與他人撞單導致不發貨！</p>}
                  </div>
               )}
            </Modal>

             <Modal isOpen={showBankInfo} title="付款資訊" onClose={() => !isProcessing && setShowBankInfo(false)}>
                  <div className="space-y-6">
                    <div className="text-center bg-wuxia-gold/10 p-3 rounded border border-wuxia-gold/30">
                        <p className="text-wuxia-gold text-xs font-bold">訂單已成立，請儘速付款</p>
                        <p className="text-stone-400 text-[10px] mt-1">單號：{currentOrderId}</p>
                    </div>
                    <div className="bg-red-900/20 border border-red-800 p-2 rounded text-center">
                        <p className="text-xs text-red-300 font-bold animate-pulse">⚠️ 請於 30 分鐘內完成轉帳，逾時訂單將自動失效</p>
                    </div>
                    <p className="text-stone-300 text-sm text-center">請匯款 <span className="text-wuxia-gold font-bold">${cartTotal || currentOrderPrice}</span> 至以下帳戶：</p>
                    <div className="bg-gradient-to-br from-stone-900 to-black p-5 rounded-lg border border-wuxia-gold/50 relative overflow-hidden shadow-inner">
                        <div className="absolute top-0 right-0 p-2 opacity-20 text-6xl text-white font-serif italic font-bold select-none">Bank</div>
                        <div className="relative z-10 space-y-3">
                            <div className="flex justify-between items-end border-b border-white/10 pb-2"><span className="text-stone-400 text-xs">銀行代碼</span><span className="text-xl font-mono text-white font-bold">{BANK_INFO.code}</span></div>
                            <div className="flex justify-between items-end border-b border-white/10 pb-2"><span className="text-stone-400 text-xs">銀行名稱</span><span className="text-lg text-white font-bold">{BANK_INFO.name}</span></div>
                            <div className="pt-1"><span className="text-stone-400 text-xs block mb-1">匯款帳號</span><div className="flex items-center justify-between bg-black/50 p-2 rounded border border-wuxia-gold/20"><span className="text-2xl font-mono text-wuxia-gold tracking-widest">{BANK_INFO.account}</span><button onClick={() => copyToClipboard(BANK_INFO.account)} className="ml-2 px-3 py-1 bg-stone-700 hover:bg-wuxia-gold hover:text-black text-xs text-white rounded transition">複製</button></div></div>
                        </div>
                    </div>
                    <div className="space-y-3 pt-2">
                        <label className="block text-sm text-wuxia-gold font-bold">付款回報</label>
                        <div className="text-xs text-stone-500 mb-1">請輸入您轉帳帳號的後五碼，以便系統對帳。</div>
                        <input type="text" placeholder="輸入後五碼" value={paymentNote} onChange={(e) => setPaymentNote(e.target.value)} className="w-full bg-black/40 border border-stone-600 rounded p-3 text-white focus:border-wuxia-gold outline-none text-center font-mono tracking-widest text-lg placeholder:text-stone-600 placeholder:text-sm" maxLength={5} />
                    </div>
                    <div className="flex gap-4 mt-4">
                       <button onClick={() => setShowBankInfo(false)} className="px-4 py-3 rounded border border-stone-600 text-stone-400 hover:bg-stone-800 transition text-sm">稍後回報</button>
                       <button type="button" onClick={confirmPaymentInfo} disabled={isProcessing} className={`flex-1 px-4 py-3 rounded bg-gradient-to-r from-wuxia-red to-wuxia-red-dark text-white font-bold transition flex justify-center items-center shadow-lg hover:shadow-wuxia-red/30 border border-wuxia-gold/30 ${isProcessing ? 'opacity-70 cursor-not-allowed' : ''}`}>{isProcessing ? '更新中...' : '已匯款，送出資訊'}</button>
                    </div>
                    <div className="text-center text-[10px] text-stone-600 mt-2">若您現在不方便付款，可關閉此視窗。<br/>您的訂單已保留，請記得在「票券夾」查看狀態。</div>
                  </div>
            </Modal>

            <ReportModal 
                isOpen={showReport} 
                user={user} 
                onClose={() => setShowReport(false)} 
                onLogin={loginWithLiffUrl} 
                initialType={reportInitType} 
                products={products} 
            />
            <WalletModal 
                isOpen={showWallet} 
                user={user} 
                onClose={() => setShowWallet(false)} 
                onLogin={loginWithLiffUrl} 
                onOpenAdmin={() => { setShowWallet(false); setShowAdmin(true); }}
                onCancelOrder={handleWalletCancelOrder}
                onReportPayment={handleWalletReportPayment}
                products={products} 
                onBuyAgain={openAddToCart} 
            />
            <ProfileModal 
                isOpen={showProfile} 
                user={user} 
                onClose={() => setShowProfile(false)} 
            />
            {showAdmin && <AdminModal isOpen={showAdmin} onClose={() => setShowAdmin(false)} />}
            {showGuide && <GuideModal isOpen={showGuide} onClose={() => setShowGuide(false)} />}
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<React.StrictMode><App /></React.StrictMode>);
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
